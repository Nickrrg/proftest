function startTest(){currentQ=0;answers=new Array(QUESTIONS.length).fill(null);showScreen('screen-quiz');renderQuestion();}
function restart(){showScreen('screen-start');}
function renderQuestion(){const q=QUESTIONS[currentQ],loc=q[currentLang],l=LABELS[currentLang];document.getElementById('question-num').textContent=`${currentLang==='ru'?'ВОПРОС':'SAVOL'} ${String(currentQ+1).padStart(2,'0')}`;document.getElementById('question-type').textContent=l.types[q.type];document.getElementById('question-text').textContent=loc.text;document.getElementById('question-subtext').textContent=loc.sub||'';document.getElementById('question-subtext').style.display=loc.sub?'block':'none';document.getElementById('progress-count').textContent=`${currentQ+1} / ${QUESTIONS.length}`;document.getElementById('progress-bar').style.width=`${Math.round(((currentQ+1)/QUESTIONS.length)*100)}%`;const area=document.getElementById('answer-area');area.innerHTML='';if(q.type==='scale'){area.innerHTML=`<div class="scale-labels"><span>${l.scale[0]}</span><span>${l.scale[1]}</span></div><div class="scale-buttons">${[1,2,3,4,5].map(v=>`<button class="scale-btn ${answers[currentQ]===v?'selected':''}" onclick="selectScale(${v})">${v}</button>`).join('')}</div>`;}else{const list=document.createElement('div');list.className='option-list';q.options.forEach((opt,i)=>{const b=document.createElement('button');b.className=`option-btn ${answers[currentQ]===i?'selected':''}`;b.onclick=()=>selectOption(i);b.innerHTML=`<div class="option-key">${String.fromCharCode(65+i)}</div><div class="option-text">${opt[currentLang]}</div>`;list.appendChild(b)});area.appendChild(list)};document.getElementById('btn-prev').textContent=l.prev;document.getElementById('btn-prev').style.visibility=currentQ===0?'hidden':'visible';const bn=document.getElementById('btn-next');bn.textContent=currentQ===QUESTIONS.length-1?l.finish:l.next;bn.classList.toggle('enabled',answers[currentQ]!==null)}
function selectScale(v){answers[currentQ]=v;renderQuestion();setTimeout(()=>currentQ<QUESTIONS.length-1?nextQuestion():finishTest(),220)}
function selectOption(i){answers[currentQ]=i;renderQuestion();setTimeout(()=>currentQ<QUESTIONS.length-1?nextQuestion():finishTest(),220)}
function nextQuestion(){if(answers[currentQ]===null)return;if(currentQ<QUESTIONS.length-1){currentQ++;renderQuestion()}else finishTest()}
function prevQuestion(){if(currentQ>0){currentQ--;renderQuestion()}}
function computeScores(){const raw={tech:0,analysis:0,creative:0,comm:0,help:0,practice:0},max={tech:0,analysis:0,creative:0,comm:0,help:0,practice:0};QUESTIONS.forEach((q,idx)=>{const a=answers[idx];if(q.type==='scale'){max[q.dir]+=5;if(a!==null)raw[q.dir]+=a}else if(q.type==='forced'){q.options.forEach(o=>max[o.dir]+=2);if(a!==null)raw[q.options[a].dir]+=2}else{q.options.forEach(o=>max[o.dir]+=3);if(a!==null)raw[q.options[a].dir]+=3}});const pct={};Object.keys(raw).forEach(k=>pct[k]=max[k]?Math.round(raw[k]/max[k]*100):0);return{raw,max,pct}}
function finishTest(){showScreen('screen-loading');['step1','step2','step3'].forEach((id,i)=>{const el=document.getElementById(id);el.classList.remove('visible','done');setTimeout(()=>el.classList.add('visible'),(i+1)*420);setTimeout(()=>el.classList.add('done'),(i+1)*420+260)});setTimeout(showResult,2000)}
function showResult(){const {pct}=computeScores();const top3=Object.keys(pct).sort((a,b)=>pct[b]-pct[a]).slice(0,3);showScreen('screen-result');document.getElementById('result-title-name').textContent=(currentLang==='ru'?'Твой профиль: ':'Sening profiling: ')+DIRECTIONS[top3[0]][currentLang].name;const c=document.getElementById('result-cards');c.innerHTML='';top3.forEach((key,idx)=>{const d=DIRECTIONS[key],i=d[currentLang],card=document.createElement('div');card.className='result-card';card.innerHTML=`<div class="result-card-accent" style="background:${d.color}"></div><div class="result-card-inner"><div class="result-rank" style="color:${d.color}">${i.ranks[idx]}</div><div class="result-dir-header"><div class="result-dir-emoji" style="background:${d.bg}">${d.emoji}</div><div><div class="result-dir-name">${i.name}</div><div class="result-dir-pct" style="color:${d.color}">${pct[key]}% ${currentLang==='ru'?'выраженности':'moslik'}</div></div></div><div class="result-bar-bg"><div class="result-bar-fill" style="background:${d.color};width:${pct[key]}%"></div></div><p class="result-desc"><strong>${currentLang==='ru'?'Почему это могло получиться:':'Nega bunday natija chiqishi mumkin:'}</strong> ${i.why}</p><p class="result-desc">${i.desc}</p><div class="result-section-title">${currentLang==='ru'?'Примеры профессий':'Kasb misollari'}</div><div class="result-professions">${i.profs.map(x=>`<span class="profession-tag">${x}</span>`).join('')}</div><div class="result-section-title" style="margin-top:14px">${currentLang==='ru'?'Что попробовать дальше':'Keyin nimalarni sinab ko‘rish mumkin'}</div><div class="result-activities">${i.activities.map(x=>`<span class="activity-tag" style="background:${d.color}">${x}</span>`).join('')}</div></div>`;c.appendChild(card);setTimeout(()=>card.classList.add('visible'),idx*120+50)});try{localStorage.setItem('emaktab_navigator_result_v3',JSON.stringify({top3,pct,answers,date:new Date().toISOString()}))}catch(e){}}
function shareResult(){const {pct}=computeScores();const top3=Object.keys(pct).sort((a,b)=>pct[b]-pct[a]).slice(0,3);const text=LABELS[currentLang].share+top3.map((k,i)=>`${i+1}. ${DIRECTIONS[k][currentLang].name} — ${pct[k]}%`).join('\n');if(navigator.share){navigator.share({title:'Навигатор будущего',text})}else if(navigator.clipboard){navigator.clipboard.writeText(text).then(()=>{const t=document.getElementById('share-toast');t.textContent=currentLang==='ru'?'Результат скопирован ✓':'Natija nusxalandi ✓';t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200)})}}
setLang('ru');
</script>
</body>
</html>
