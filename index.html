<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Навигатор будущего | eMaktab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{
      --primary:#5B4FE9;
      --primary-light:#7B70F5;
      --accent:#FF6B35;
      --accent2:#00C9A7;
      --bg:#F4F3FF;
      --surface:#fff;
      --surface2:#F0EFFD;
      --text:#1A1740;
      --text2:#6B68A0;
      --text3:#9896BE;
      --radius:20px;
      --shadow:0 4px 24px rgba(91,79,233,.12);
      --shadow-lg:0 12px 48px rgba(91,79,233,.18);
      --c1:#5B4FE9;
      --c2:#00B4D8;
      --c3:#FF6B6B;
      --c4:#FF9F1C;
      --c5:#06D6A0;
      --c6:#8338EC
    }

    *{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:'Nunito',sans-serif;
      background:var(--bg);
      color:var(--text);
      min-height:100vh;
      overflow-x:hidden
    }

    .header{
      position:fixed;
      top:0;
      left:0;
      right:0;
      z-index:100;
      background:rgba(244,243,255,.88);
      backdrop-filter:blur(12px);
      padding:12px 20px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      border-bottom:1px solid rgba(91,79,233,.08)
    }

    .brand-logo{height:38px;width:auto;display:block}
    .hero-logo{height:86px;width:auto;display:block;margin:0 auto 18px}

    .lang-toggle{
      display:flex;
      gap:4px;
      background:var(--surface2);
      border-radius:10px;
      padding:4px
    }
    .lang-btn{
      border:none;
      background:none;
      padding:6px 14px;
      border-radius:8px;
      font:700 .85rem 'Nunito',sans-serif;
      cursor:pointer;
      color:var(--text2)
    }
    .lang-btn.active{
      background:var(--primary);
      color:#fff
    }

    .screen{display:none;min-height:100vh;padding-top:72px}
    .screen.active{display:flex;flex-direction:column}

    #screen-start{
      background:linear-gradient(160deg,#EEF0FF 0%,#F4F3FF 50%,#FFF5F0 100%);
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:72px 24px 40px
    }

    .start-content{position:relative;max-width:640px}
    .start-blob{
      position:absolute;
      border-radius:50%;
      filter:blur(80px);
      opacity:.35;
      pointer-events:none
    }
    .blob1{width:400px;height:400px;background:var(--primary);top:-100px;left:-100px}
    .blob2{width:300px;height:300px;background:var(--accent);bottom:50px;right:-50px}
    .blob3{width:200px;height:200px;background:var(--accent2);top:30%;left:60%}

    .start-hero{
      font-size:clamp(2.2rem,6vw,3.4rem);
      font-weight:900;
      line-height:1.1;
      letter-spacing:-1.5px;
      margin-bottom:16px
    }
    .start-hero .highlight{color:var(--primary)}
    .start-hero .highlight2{color:var(--accent)}

    .start-sub{
      font-size:1.05rem;
      color:var(--text2);
      line-height:1.6;
      margin-bottom:36px;
      max-width:520px;
      margin-left:auto;
      margin-right:auto
    }

    .direction-pills{
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      gap:10px;
      margin-bottom:36px
    }
    .direction-pill{
      display:flex;
      align-items:center;
      gap:7px;
      background:#fff;
      border-radius:50px;
      padding:8px 16px;
      font-size:.82rem;
      font-weight:700;
      box-shadow:0 2px 10px rgba(0,0,0,.06)
    }

    .start-meta{
      display:flex;
      justify-content:center;
      gap:24px;
      margin-bottom:40px;
      flex-wrap:wrap
    }
    .meta-item{
      display:flex;
      align-items:center;
      gap:8px;
      font-size:.88rem;
      font-weight:700;
      color:var(--text2)
    }

    .btn-primary{
      display:inline-flex;
      align-items:center;
      gap:10px;
      background:var(--primary);
      color:#fff;
      font:800 1rem 'Nunito',sans-serif;
      padding:16px 36px;
      border-radius:50px;
      border:none;
      cursor:pointer;
      box-shadow:0 8px 28px rgba(91,79,233,.35)
    }

    .start-disclaimer{
      font-size:.78rem;
      color:var(--text3);
      margin-top:20px
    }

    #screen-quiz,
    #screen-result{
      background:var(--bg);
      padding:88px 24px 40px;
      align-items:center
    }

    .quiz-wrap,
    .result-wrap{
      width:100%;
      max-width:760px;
      margin:0 auto
    }

    .progress-area{margin-bottom:32px}
    .progress-header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:10px
    }
    .progress-label{
      font-weight:700;
      font-size:.85rem;
      color:var(--text2)
    }
    .progress-count{
      font-weight:900;
      font-size:.9rem;
      color:var(--primary)
    }
    .progress-bar-bg{
      background:#fff;
      border-radius:50px;
      height:10px;
      overflow:hidden;
      box-shadow:inset 0 2px 6px rgba(91,79,233,.08)
    }
    .progress-bar-fill{
      height:100%;
      border-radius:50px;
      background:linear-gradient(90deg,var(--primary),var(--primary-light));
      transition:width .5s
    }

    .question-card{
      background:#fff;
      border-radius:var(--radius);
      padding:36px;
      box-shadow:var(--shadow-lg);
      margin-bottom:24px;
      position:relative;
      overflow:hidden
    }
    .question-card::before{
      content:'';
      position:absolute;
      top:0;
      left:0;
      right:0;
      height:4px;
      background:linear-gradient(90deg,var(--primary),var(--accent))
    }

    .question-num{
      font-size:.78rem;
      font-weight:800;
      color:var(--text3);
      letter-spacing:1px;
      text-transform:uppercase;
      margin-bottom:14px
    }
    .question-type{
      display:inline-flex;
      align-items:center;
      padding:6px 12px;
      border-radius:50px;
      font-size:.72rem;
      font-weight:800;
      color:var(--primary);
      background:var(--surface2);
      margin-bottom:14px;
      text-transform:uppercase
    }
    .question-text{
      font-size:1.12rem;
      font-weight:700;
      line-height:1.55
    }
    .question-subtext{
      margin-top:12px;
      font-size:.88rem;
      color:var(--text2);
      line-height:1.5
    }
    .answer-area{margin-top:16px}

    .scale-labels{
      display:flex;
      justify-content:space-between;
      font-size:.9rem;
      font-weight:800;
      color:var(--text2);
      margin-bottom:14px;
      gap:12px
    }
    .scale-buttons{
      display:flex;
      gap:10px;
      justify-content:center;
      flex-wrap:wrap
    }
    .scale-btn{
      width:54px;
      height:54px;
      border-radius:16px;
      border:2.5px solid #E8E6F8;
      background:#fff;
      font:900 1.1rem 'Nunito',sans-serif;
      color:var(--text2);
      cursor:pointer
    }
    .scale-btn.selected{
      background:var(--primary);
      border-color:var(--primary);
      color:#fff;
      transform:scale(1.08);
      box-shadow:0 6px 20px rgba(91,79,233,.35)
    }

    .option-list{display:grid;gap:12px}
    .option-btn{
      width:100%;
      text-align:left;
      padding:16px 18px;
      border-radius:16px;
      border:2px solid #E8E6F8;
      background:#fff;
      cursor:pointer
    }
    .option-btn.selected{
      border-color:var(--primary);
      box-shadow:0 8px 22px rgba(91,79,233,.16);
      background:#FAF9FF
    }
    .option-key{
      font-size:.75rem;
      font-weight:900;
      color:var(--primary);
      letter-spacing:1px;
      margin-bottom:6px;
      text-transform:uppercase
    }
    .option-text{
      font-size:.98rem;
      font-weight:700;
      line-height:1.45
    }

    .quiz-nav{
      display:flex;
      justify-content:space-between;
      align-items:center
    }
    .btn-ghost{
      background:none;
      border:2.5px solid #E8E6F8;
      color:var(--text2);
      font:800 .9rem 'Nunito',sans-serif;
      padding:12px 24px;
      border-radius:50px;
      cursor:pointer
    }
    .btn-next{
      background:var(--primary);
      color:#fff;
      font:800 .95rem 'Nunito',sans-serif;
      padding:13px 30px;
      border-radius:50px;
      border:none;
      cursor:pointer;
      opacity:.4;
      pointer-events:none
    }
    .btn-next.enabled{
      opacity:1;
      pointer-events:all
    }

    #screen-loading{
      background:linear-gradient(160deg,#EEF0FF,#F4F3FF);
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:80px 24px
    }

    .loading-content{max-width:480px}
    .loading-animation{
      width:120px;
      height:120px;
      margin:0 auto 32px;
      position:relative
    }
    .loading-ring{
      position:absolute;
      inset:0;
      border-radius:50%;
      border:4px solid transparent;
      animation:spin 1.5s linear infinite
    }
    .ring1{border-top-color:var(--primary)}
    .ring2{border-right-color:var(--accent);inset:12px;animation-duration:2s;animation-direction:reverse}
    .ring3{border-bottom-color:var(--accent2);inset:24px;animation-duration:1s}
    @keyframes spin{to{transform:rotate(360deg)}}
    .loading-emoji{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:2rem
    }

    .loading-title{
      font-size:1.8rem;
      font-weight:900;
      margin-bottom:12px
    }
    .loading-sub{
      font-size:.95rem;
      color:var(--text2);
      line-height:1.6;
      margin-bottom:32px
    }
    .loading-step{
      display:flex;
      align-items:center;
      gap:12px;
      padding:12px 20px;
      background:#fff;
      border-radius:12px;
      margin-bottom:10px;
      text-align:left;
      opacity:0;
      transform:translateY(10px);
      transition:all .4s
    }
    .loading-step.visible{
      opacity:1;
      transform:translateY(0)
    }
    .loading-step.done .step-icon{background:var(--accent2)}
    .step-icon{
      width:32px;
      height:32px;
      border-radius:10px;
      background:var(--surface2);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:1rem;
      flex-shrink:0
    }

    .result-header{text-align:center;margin-bottom:40px}
    .result-badge{
      display:inline-flex;
      align-items:center;
      gap:8px;
      background:#fff;
      border-radius:50px;
      padding:8px 18px;
      font-weight:700;
      font-size:.78rem;
      color:var(--primary);
      box-shadow:0 2px 12px rgba(91,79,233,.12);
      margin-bottom:16px;
      text-transform:uppercase;
      letter-spacing:.5px
    }
    .result-title{
      font-size:clamp(1.8rem,5vw,2.5rem);
      font-weight:900;
      letter-spacing:-1px;
      margin-bottom:10px
    }
    .result-sub{
      font-size:.95rem;
      color:var(--text2)
    }

    .result-card{
      background:#fff;
      border-radius:var(--radius);
      padding:28px;
      box-shadow:var(--shadow);
      margin-bottom:20px;
      position:relative;
      overflow:hidden;
      opacity:0;
      transform:translateY(24px);
      transition:all .5s
    }
    .result-card.visible{
      opacity:1;
      transform:translateY(0)
    }

    .result-card-accent{
      position:absolute;
      top:0;
      left:0;
      bottom:0;
      width:5px
    }
    .result-card-inner{padding-left:16px}
    .result-rank{
      font-size:.72rem;
      font-weight:800;
      letter-spacing:1.5px;
      text-transform:uppercase;
      margin-bottom:10px;
      opacity:.7
    }
    .result-dir-header{
      display:flex;
      align-items:center;
      gap:14px;
      margin-bottom:14px;
      flex-wrap:wrap
    }
    .result-dir-emoji{
      font-size:2rem;
      width:52px;
      height:52px;
      border-radius:16px;
      display:flex;
      align-items:center;
      justify-content:center;
      flex-shrink:0
    }
    .result-dir-name{
      font-size:1.15rem;
      font-weight:900
    }
    .result-dir-pct{
      font-size:.85rem;
      font-weight:700;
      margin-top:2px
    }
    .result-bar-bg{
      background:var(--surface2);
      border-radius:50px;
      height:8px;
      margin-bottom:14px;
      overflow:hidden
    }
    .result-bar-fill{
      height:100%;
      border-radius:50px;
      width:0;
      transition:width 1s
    }

    .result-desc{
      font-size:.9rem;
      color:var(--text2);
      line-height:1.65;
      margin-bottom:16px
    }

    .result-section{
      margin-bottom:16px
    }
    .result-section:last-child{
      margin-bottom:0
    }
    .result-section-title{
      font-size:.72rem;
      font-weight:800;
      letter-spacing:1px;
      text-transform:uppercase;
      color:var(--text3);
      margin-bottom:8px
    }

    .result-tags{
      display:flex;
      flex-wrap:wrap;
      gap:8px
    }
    .result-tag{
      background:var(--surface2);
      border-radius:50px;
      padding:7px 14px;
      font-size:.84rem;
      font-weight:700;
      color:var(--text)
    }
    .result-tag.colored{color:#fff}

    .result-actions{
      display:flex;
      gap:12px;
      justify-content:center;
      flex-wrap:wrap;
      margin-top:8px
    }
    .btn-share,
    .btn-restart{
      display:inline-flex;
      align-items:center;
      gap:8px;
      font:800 .9rem 'Nunito',sans-serif;
      padding:13px 26px;
      border-radius:50px;
      cursor:pointer
    }
    .btn-share{
      background:#fff;
      border:2.5px solid #E8E6F8;
      color:var(--text)
    }
    .btn-restart{
      background:var(--primary);
      color:#fff;
      border:none
    }

    .share-toast{
      position:fixed;
      bottom:24px;
      left:50%;
      transform:translateX(-50%) translateY(80px);
      background:var(--text);
      color:#fff;
      padding:14px 24px;
      border-radius:50px;
      font-weight:700;
      font-size:.88rem;
      z-index:999;
      transition:transform .3s
    }
    .share-toast.show{
      transform:translateX(-50%) translateY(0)
    }


.result-hero{
  background:linear-gradient(160deg,#fff 0%,#F7F5FF 60%,#FFF9F4 100%);
  border:1px solid rgba(91,79,233,.08)
}
.result-kicker{
  display:inline-flex;
  align-items:center;
  gap:8px;
  background:rgba(91,79,233,.08);
  color:var(--primary);
  border-radius:999px;
  padding:8px 14px;
  font-size:.8rem;
  font-weight:800;
  margin-bottom:16px
}
.result-arch-title{
  font-size:clamp(1.5rem,4vw,2.15rem);
  font-weight:900;
  letter-spacing:-.8px;
  margin-bottom:12px
}
.result-arch-summary{
  font-size:1rem;
  line-height:1.7;
  color:var(--text2);
  margin-bottom:18px
}
.signal-row{
  display:flex;
  flex-wrap:wrap;
  gap:10px
}
.signal-chip{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:10px 14px;
  background:#fff;
  border:1px solid #E8E6F8;
  border-radius:999px;
  font-size:.86rem;
  font-weight:800;
  color:var(--text)
}
.signal-chip span{
  color:var(--text2);
  font-weight:700
}
.insight-grid{
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:14px
}
.insight-item{
  background:#FAF9FF;
  border:1px solid #ECEAFD;
  border-radius:18px;
  padding:18px
}
.insight-item.highlight{
  background:linear-gradient(180deg,#F8F7FF 0%,#FFFFFF 100%)
}
.insight-title{
  font-size:.8rem;
  font-weight:900;
  text-transform:uppercase;
  letter-spacing:.8px;
  color:var(--text3);
  margin-bottom:8px
}
.insight-text{
  font-size:.95rem;
  line-height:1.65;
  color:var(--text)
}
.track-grid{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:14px;
  margin-bottom:18px
}
.track-card{
  border-radius:18px;
  padding:18px;
  border:1px solid #ECEAFD;
  background:#FAF9FF
}
.track-card.primary{
  background:linear-gradient(165deg,#F6F4FF 0%,#FFFFFF 100%);
  border-color:rgba(91,79,233,.18)
}
.track-label{
  font-size:.75rem;
  font-weight:900;
  text-transform:uppercase;
  letter-spacing:1px;
  color:var(--text3);
  margin-bottom:10px
}
.track-name{
  font-size:1.08rem;
  font-weight:900;
  margin-bottom:8px
}
.track-text{
  font-size:.93rem;
  color:var(--text2);
  line-height:1.65
}
.section-stack{
  display:grid;
  gap:14px
}
.plain-list{
  list-style:none;
  display:grid;
  gap:10px
}
.plain-list li{
  position:relative;
  padding-left:18px;
  font-size:.93rem;
  line-height:1.55;
  color:var(--text)
}
.plain-list li::before{
  content:'•';
  position:absolute;
  left:0;
  top:0;
  color:var(--primary);
  font-weight:900
}
.helper-note{
  margin-top:10px;
  font-size:.82rem;
  color:var(--text3)
}

    @media(max-width:860px){
      .insight-grid,
      .track-grid{grid-template-columns:1fr}
    }

    @media(max-width:600px){
      .brand-logo{height:30px}
      .hero-logo{height:64px}
      .question-card{padding:24px 20px}
      .scale-labels{font-size:.82rem}
      .scale-btn{width:46px;height:46px;font-size:1rem}
      .option-text{font-size:.93rem}
      .result-card{padding:22px 18px}
      .result-card-inner{padding-left:10px}
    }
  </style>
</head>
<body>
  <header class="header">
    <img class="brand-logo" src="assets/emaktab-logo.svg" alt="eMaktab" />
    <div class="lang-toggle">
      <button class="lang-btn active" onclick="setLang('ru')" id="btn-ru">RU</button>
      <button class="lang-btn" onclick="setLang('uz')" id="btn-uz">UZ</button>
    </div>
  </header>

  <div class="screen active" id="screen-start">
    <div class="start-blob blob1"></div>
    <div class="start-blob blob2"></div>
    <div class="start-blob blob3"></div>

    <div class="start-content">
      <img class="hero-logo" src="assets/emaktab-logo.svg" alt="eMaktab" />
      <h1 class="start-hero">
        <span class="highlight" data-ru="Навигатор" data-uz="Kelajak"></span><br>
        <span class="highlight2" data-ru="будущего" data-uz="navigatori"></span>
      </h1>

      <p class="start-sub"
         data-ru="Пройди 24 вопроса и узнай, какой образовательный трек и формат деятельности тебе сейчас ближе всего."
         data-uz="24 ta savolga javob berib, ayni paytda senga qaysi ta’lim treki va faoliyat formati yaqinroq ekanini bilib ol."></p>

      <div class="direction-pills">
        <div class="direction-pill" style="color:var(--c1)">💻 <span data-ru="Технологии" data-uz="Texnologiyalar"></span></div>
        <div class="direction-pill" style="color:var(--c2)">🔬 <span data-ru="Анализ" data-uz="Tahlil"></span></div>
        <div class="direction-pill" style="color:var(--c3)">🎨 <span data-ru="Творчество" data-uz="Ijod"></span></div>
        <div class="direction-pill" style="color:var(--c4)">🎤 <span data-ru="Коммуникации" data-uz="Muloqot"></span></div>
        <div class="direction-pill" style="color:var(--c5)">🤝 <span data-ru="Помощь" data-uz="Yordam"></span></div>
        <div class="direction-pill" style="color:var(--c6)">🔧 <span data-ru="Практика" data-uz="Amaliyot"></span></div>
      </div>

      <div class="start-meta">
        <div class="meta-item">❓ <span data-ru="24 вопроса" data-uz="24 ta savol"></span></div>
        <div class="meta-item">⏱️ <span data-ru="5–7 минут" data-uz="5–7 daqiqa"></span></div>
        <div class="meta-item">🎯 <span data-ru="1 итоговая рекомендация" data-uz="1 ta yakuniy tavsiya"></span></div>
      </div>

      <button class="btn-primary" onclick="startTest()">
        <span data-ru="Пройти тест" data-uz="Testni boshlash"></span>
        <span>→</span>
      </button>

      <p class="start-disclaimer"
         data-ru="Это не официальный психологический тест — это дружелюбный ориентир."
         data-uz="Bu rasmiy psixologik test emas, balki do‘stona yo‘naltiruvchi testdir."></p>

        ru:{name:'творчество и самовыражение', strengths:['придумывать подачу','делать заметно и выразительно','искать нестандартные решения'], subjects:['Литература','Искусство / дизайн','Медиа и проектные модули'], environment:['пространство для идей','визуальные и креативные задачи','проекты с презентацией результата']},
        uz:{name:'ijod va o‘zini ifodalash', strengths:['taqdimot o‘ylab topish','yorqin va ifodali qilish','nostandart yechim topish'], subjects:['Adabiyot','San’at / dizayn','Media va loyiha modullari'], environment:['g‘oya uchun joy','vizual va kreativ vazifalar','natijani taqdim etadigan loyihalar']}
      }
    };

    const ARCHETYPE_TITLES = {
      'analysis_tech': {ru:'Системный исследователь', uz:'Tizimli tadqiqotchi'},
      'practice_tech': {ru:'Прикладной инженер', uz:'Amaliy muhandis'},
      'analysis_creative': {ru:'Концептуальный создатель', uz:'Konseptual yaratuvchi'},
      'analysis_comm': {ru:'Стратегический коммуникатор', uz:'Strategik kommunikator'},
      'analysis_help': {ru:'Вдумчивый наставник', uz:'Mulohazali ustoz'},
      'analysis_practice': {ru:'Архитектор решения', uz:'Yechim me’mori'},
      'comm_creative': {ru:'Креативный коммуникатор', uz:'Kreativ kommunikator'},
      'comm_help': {ru:'Наставник-лидер', uz:'Ustoz-yetakchi'},
      'comm_practice': {ru:'Организатор действия', uz:'Harakat tashkilotchisi'},
      'comm_tech': {ru:'Технический координатор', uz:'Texnik koordinatori'},
      'creative_help': {ru:'Эмпатичный создатель', uz:'Empatik yaratuvchi'},
      'creative_practice': {ru:'Создатель руками', uz:'Qo‘l bilan yaratuvchi'},
      'creative_tech': {ru:'Дизайнер решений', uz:'Yechimlar dizayneri'},
      'help_practice': {ru:'Практичный помощник', uz:'Amaliy yordamchi'},
      'help_tech': {ru:'Технологичный наставник', uz:'Texnologik ustoz'}
    };

    const INSTITUTION_CATALOG = {
      academic:{
        ru:['Профильные классы с углублёнными предметами','Академические лицеи','Школы с сильной проектной и олимпиадной подготовкой','Программы, ведущие к поступлению в вуз'],
        uz:['Chuqurlashtirilgan fanli profil sinflar','Akademik litseylar','Loyiha va olimpiada tayyorgarligi kuchli maktablar','Oliygohga olib boradigan dasturlar']
      },
      professional:{
        ru:['Колледжи и техникумы по профилю','Профессиональные школы с практикой','Программы с мастерскими и лабораториями','Маршруты, где можно быстро получить прикладной навык'],
        uz:['Profil bo‘yicha kollej va texnikumlar','Amaliyotga ega professional maktablar','Ustaxona va laboratoriyali dasturlar','Tezda amaliy ko‘nikma beradigan yo‘llar']
      },
      general:{
        ru:['Классы с выбором модулей и элективов','Школы, где можно пробовать разные форматы','Среда с проектами, кружками и профпробами','Маршруты без ранней узкой специализации'],
        uz:['Modul va elektiv tanlovi bor sinflar','Turli formatlarni sinab ko‘rish mumkin bo‘lgan maktablar','Loyiha, to‘garak va profprobali muhit','Erta tor ixtisoslashuvsiz yo‘llar']
      }
    };

    let currentLang='ru';
    let currentQ=0;
    let answers=new Array(QUESTIONS.length).fill(null);

    function setLang(lang){
      currentLang=lang;
      document.getElementById('btn-ru').classList.toggle('active',lang==='ru');
      document.getElementById('btn-uz').classList.toggle('active',lang==='uz');

      document.querySelectorAll('[data-ru]').forEach(el=>{
        el.textContent = lang==='ru' ? el.dataset.ru : el.dataset.uz;
      });

      if(document.getElementById('screen-quiz').classList.contains('active')) renderQuestion();
      if(document.getElementById('screen-result').classList.contains('active')) showResult();
    }

    function showScreen(id){
      document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    function startTest(){
      currentQ=0;
      answers=new Array(QUESTIONS.length).fill(null);
      showScreen('screen-quiz');
      renderQuestion();
    }

    function restart(){
      showScreen('screen-start');
    }

    function renderQuestion(){
      const q=QUESTIONS[currentQ];
      const loc=q[currentLang];
      const l=LABELS[currentLang];

      document.getElementById('question-num').textContent=`${currentLang==='ru'?'ВОПРОС':'SAVOL'} ${String(currentQ+1).padStart(2,'0')}`;
      document.getElementById('question-type').textContent=l.types[q.type];
      document.getElementById('question-text').textContent=loc.text;
      document.getElementById('question-subtext').textContent=loc.sub||'';
      document.getElementById('question-subtext').style.display=loc.sub?'block':'none';

      document.getElementById('progress-count').textContent=`${currentQ+1} / ${QUESTIONS.length}`;
      document.getElementById('progress-bar').style.width=`${Math.round(((currentQ+1)/QUESTIONS.length)*100)}%`;

      const area=document.getElementById('answer-area');
      area.innerHTML='';

      const list=document.createElement('div');
      list.className='option-list';
      q.options.forEach((opt,i)=>{
        const b=document.createElement('button');
        b.className=`option-btn ${answers[currentQ]===i?'selected':''}`;
        b.onclick=()=>selectOption(i);
        b.innerHTML=`
          <div class="option-key">${String.fromCharCode(65+i)}</div>
          <div class="option-text">${opt[currentLang]}</div>
        `;
        list.appendChild(b);
      });
      area.appendChild(list);

      document.getElementById('btn-prev').textContent=l.prev;
      document.getElementById('btn-prev').style.visibility=currentQ===0?'hidden':'visible';

      const bn=document.getElementById('btn-next');
      bn.textContent=currentQ===QUESTIONS.length-1?l.finish:l.next;
      bn.classList.toggle('enabled',answers[currentQ]!==null);
    }

    function selectOption(i){
      answers[currentQ]=i;
      renderQuestion();
      setTimeout(()=>currentQ<QUESTIONS.length-1?nextQuestion():finishTest(),220);
    }

    function nextQuestion(){
      if(answers[currentQ]===null) return;
      if(currentQ<QUESTIONS.length-1){
        currentQ++;
        renderQuestion();
      }else{
        finishTest();
      }
    }

    function prevQuestion(){
      if(currentQ>0){
        currentQ--;
        renderQuestion();
      }
    }

    function computeScores(){
      const raw={tech:0,analysis:0,creative:0,comm:0,help:0,practice:0};
      QUESTIONS.forEach((q,idx)=>{
        const a=answers[idx];
        if(a!==null) raw[q.options[a].dir]+=1;
      });
      return {raw};
    }

    function getPairKey(a,b){
      return [a,b].sort().join('_');
    }

    function getSignalTone(delta, isPrimary=false){
      const l=LABELS[currentLang];
      if(delta>=3) return l.strongSignal;
      if(delta>=1 || isPrimary) return l.expressedSignal;
      return l.notableSignal;
    }

    function uniqueItems(arr){
      return [...new Set(arr.filter(Boolean))];
    }

    function rankTracks(raw){
      const trackScores = {
        academic: raw.analysis*2 + raw.tech*1.5 + raw.help*0.4,
        professional: raw.practice*2 + raw.tech*1.4 + raw.comm*0.6,
        general: raw.creative*1.6 + raw.comm*1.5 + raw.help*1.2 + raw.analysis*0.2
      };
      return Object.keys(trackScores).sort((a,b)=>trackScores[b]-trackScores[a]);
    }

    function getArchetypeTitle(top1, top2){
      const pair = ARCHETYPE_TITLES[getPairKey(top1, top2)];
      if(pair) return pair[currentLang];
      return currentLang==='ru' ? DIRECTIONS[top1].ru.name : DIRECTIONS[top1].uz.name;
    }

    function buildResultModel(){
      const {raw}=computeScores();
      const sorted=Object.keys(raw).sort((a,b)=>raw[b]-raw[a]);
      const [top1,top2,top3]=[sorted[0],sorted[1],sorted[2]];
      const m1=DIRECTION_META[top1][currentLang];
      const m2=DIRECTION_META[top2][currentLang];
      const trackRank = rankTracks(raw);
      const primaryTrack = trackRank[0];
      const secondaryTrack = trackRank[1];

      const subjects = uniqueItems([...m1.subjects, ...m2.subjects]).slice(0,5);
      const environment = primaryTrack==='general'
        ? INSTITUTION_CATALOG.general[currentLang]
        : uniqueItems([...m1.environment, ...INSTITUTION_CATALOG[primaryTrack][currentLang]]).slice(0,4);

      const summary = currentLang==='ru'
        ? `Тебе подходит среда, где сочетаются ${m1.name} и ${m2.name}. Скорее всего, ты сильнее раскрываешься там, где можно не только интересоваться темой, но и применять свой способ мышления в реальном деле.`
        : `Senga ${m1.name} va ${m2.name} uyg‘unlashgan muhit mos. Ehtimol, mavzuga qiziqish bilan birga o‘z fikrlash usulingni amalda qo‘llash mumkin bo‘lgan joyda yaxshiroq ochilasan.`;

      const bestAt = currentLang==='ru'
        ? `${m1.strengths[0]}, ${m1.strengths[1]} и подключать ${m2.strengths[0]}.`
        : `${m1.strengths[0]}, ${m1.strengths[1]} va ${m2.strengths[0]}ni qo‘shish.`;

      const bored = currentLang==='ru'
        ? `Там, где много хаоса, мало смысла и почти нет задач, в которых можно проявить ${m1.name}.`
        : `${m1.name}ni ko‘rsatish mumkin bo‘lmagan, ma’nosi kam va tartibsiz muhitda zerikishing mumkin.`;

      const format = currentLang==='ru'
        ? primaryTrack==='academic'
          ? 'Тебе лучше подходит обучение со структурой, сильными профильными предметами и задачами, где нужно сравнивать, проверять и делать выводы.'
          : primaryTrack==='professional'
            ? 'Тебе легче раскрыться в формате с практикой, понятными шагами, мастерскими, проектами и результатом, который можно увидеть руками.'
            : 'Тебе подойдёт среда, где можно пробовать разные форматы, не сужать выбор слишком рано и развивать сильные стороны через проекты и модули.'
        : primaryTrack==='academic'
          ? 'Senga tuzilma, kuchli profil fanlari va solishtirish, tekshirish hamda xulosa chiqarish talab qilinadigan ta’lim mosroq.'
          : primaryTrack==='professional'
            ? 'Senga amaliyot, aniq qadamlar, ustaxona, loyiha va qo‘l bilan ko‘rish mumkin bo‘lgan natijali format mosroq.'
            : 'Senga turli formatlarni sinab ko‘rish, tanlovni erta toraytirmaslik va kuchli tomonlarni loyiha hamda modullar orqali rivojlantirish mumkin bo‘lgan muhit mos.';

      const nextSteps = currentLang==='ru'
        ? [
            `Выбери один мини-проект в направлении «${DIRECTIONS[top1].ru.name}».`,
            `Попробуй одну активность из смежного направления «${DIRECTIONS[top2].ru.name}».`,
            `Обсуди с учителем или родителем, какой класс, модуль или кружок усилит этот профиль.`
          ]
        : [
            `“${DIRECTIONS[top1].uz.name}” yo‘nalishida bitta mini-loyihani tanla.`,
            `Yondosh “${DIRECTIONS[top2].uz.name}” yo‘nalishidan bitta faoliyatni sinab ko‘r.`,
            `O‘qituvchi yoki ota-ona bilan qaysi sinf, modul yoki to‘garak bu profilni kuchaytirishini muhokama qil.`
          ];

      return {
        raw, top1, top2, top3,
        archetypeTitle:getArchetypeTitle(top1, top2),
        summary, bestAt, bored, format,
        primaryTrack, secondaryTrack,
        subjects, environment, nextSteps,
        signal1Name: currentLang==='ru' ? DIRECTIONS[top1].ru.name : DIRECTIONS[top1].uz.name,
        signal2Name: currentLang==='ru' ? DIRECTIONS[top2].ru.name : DIRECTIONS[top2].uz.name,
        signal1Tone:getSignalTone(raw[top1]-raw[top2], true),
        signal2Tone:getSignalTone(raw[top2]-raw[top3], false)
      };
    }

    function renderPlainList(items){
      return `<ul class="plain-list">${items.map(item=>`<li>${item}</li>`).join('')}</ul>`;
    }

    function finishTest(){
      showScreen('screen-loading');

      ['step1','step2','step3'].forEach((id,i)=>{
        const el=document.getElementById(id);
        el.classList.remove('visible','done');
        setTimeout(()=>el.classList.add('visible'),(i+1)*420);
        setTimeout(()=>el.classList.add('done'),(i+1)*420+260);
      });

      setTimeout(showResult,1800);
    }

    function showResult(){
      const model=buildResultModel();
      const l=LABELS[currentLang];
      const top1=DIRECTIONS[model.top1];
      const top2=DIRECTIONS[model.top2];

      showScreen('screen-result');
      document.getElementById('result-title-name').textContent = l.resultHeroPrefix + model.archetypeTitle;
      document.getElementById('result-subtitle').textContent = l.resultSubtitle;

      const c=document.getElementById('result-cards');
      c.innerHTML='';

      const cardsMarkup = [
        `
        <div class="result-card result-hero visible">
          <div class="result-kicker">🧭 ${currentLang==='ru'?'Твой профиль интересов':'Qiziqish profiling'}</div>
          <div class="result-arch-title">${model.archetypeTitle}</div>
          <div class="result-arch-summary">${model.summary}</div>
          <div class="signal-row">
            <div class="signal-chip">${l.mainSignal}: <span>${model.signal1Name} — ${model.signal1Tone}</span></div>
            <div class="signal-chip">${l.secondSignal}: <span>${model.signal2Name} — ${model.signal2Tone}</span></div>
          </div>
        </div>
        `,
        `
        <div class="result-card visible">
          <div class="insight-grid">
            <div class="insight-item highlight">
              <div class="insight-title">${l.bestAtTitle}</div>
              <div class="insight-text">${model.bestAt}</div>
            </div>
            <div class="insight-item">
              <div class="insight-title">${l.boredTitle}</div>
              <div class="insight-text">${model.bored}</div>
            </div>
            <div class="insight-item">
              <div class="insight-title">${l.formatTitle}</div>
              <div class="insight-text">${model.format}</div>
            </div>
          </div>
        </div>
        `,
        `
        <div class="result-card visible">
          <div class="track-grid">
            <div class="track-card primary">
              <div class="track-label">${l.primaryTrackTitle}</div>
              <div class="track-name">${TRACKS[model.primaryTrack][currentLang].name}</div>
              <div class="track-text">${TRACKS[model.primaryTrack][currentLang].summary}</div>
            </div>
            <div class="track-card">
              <div class="track-label">${l.secondaryTrackTitle}</div>
              <div class="track-name">${TRACKS[model.secondaryTrack][currentLang].name}</div>
              <div class="track-text">${TRACKS[model.secondaryTrack][currentLang].summary}</div>
            </div>
          </div>
        </div>
        `,
        `
        <div class="result-card visible">
          <div class="section-stack">
            <div class="result-section">
              <div class="result-section-title">${l.importantSubjectsTitle}</div>
              ${renderPlainList(model.subjects)}
            </div>
            <div class="result-section">
              <div class="result-section-title">${l.environmentTitle}</div>
              ${renderPlainList(model.environment)}
              <div class="helper-note">${currentLang==='ru' ? 'Сюда можно подставить реальный список школ или колледжей из базы МДШО.' : 'Bu yerga MMTV bazasidan real maktab yoki kollejlar ro‘yxatini qo‘shish mumkin.'}</div>
            </div>
            <div class="result-section">
              <div class="result-section-title">${l.nextStepsTitle}</div>
              ${renderPlainList(model.nextSteps)}
            </div>
          </div>
        </div>
        `
      ].join('');

      c.innerHTML = cardsMarkup;

      try{
        localStorage.setItem('emaktab_navigator_result_v5',JSON.stringify({
          model,
          answers,
          date:new Date().toISOString()
        }));
      }catch(e){}
    }

    function shareResult(){
      const model=buildResultModel();
      const l=LABELS[currentLang];
      const text = `${l.share}${model.archetypeTitle}
${l.primaryTrackTitle}: ${TRACKS[model.primaryTrack][currentLang].name}
${l.secondSignal}: ${model.signal2Name}`;

      if(navigator.share){
        navigator.share({title:'Навигатор будущего',text});
      }else if(navigator.clipboard){
        navigator.clipboard.writeText(text).then(()=>{
          const t=document.getElementById('share-toast');
          t.textContent=l.copied;
          t.classList.add('show');
          setTimeout(()=>t.classList.remove('show'),2200);
        });
      }
    }

    setLang('ru');

  </script>
</body>
</html>
